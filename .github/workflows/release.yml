name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Set timezone to America/Sao_Paulo
        run: sudo timedatectl set-timezone America/Sao_Paulo

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y upx zip

      - name: Run Tests
        run: make test

      - name: Build multi-platform packages
        run: make release-cross VERSION=${GITHUB_REF#refs/tags/}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/go-imapsync_*_linux_amd64.tar.gz
            dist/go-imapsync_*_darwin_arm64.tar.gz
            dist/go-imapsync_*_windows_amd64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
